<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel Administrativo</title>

    <link rel="stylesheet" href="CSS/admin.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="layout">

    <!-- MENU -->

    <aside class="sidebar">

        <div class="logo-area">

            <img src="IMAGENS/g4f.jpg" class="logo">

            <img src="IMAGENS/prodesp.png" class="logo">

        </div>

        <h2>Painel</h2>

        <nav>

            <button class="menu ativo">
                Dashboard
            </button>

            <button class="menu">
                Técnicos
            </button>

            <button class="menu">
                Configurações
            </button>

            <button class="menu sair">
                Sair
            </button>

        </nav>

    </aside>



    <!-- CONTEÚDO -->

    <main class="conteudo">

        <header>

            <h1>

                LOCALIZADOR DE TÉCNICOS

            </h1>

            <button id="novoTecnico">

                + NOVO TÉCNICO

            </button>

        </header>



        <!-- DASHBOARD -->

        <section class="cards">

            <div class="card">

                <h3>Total Técnicos</h3>

                <span id="totalTecnicos">

                    0

                </span>

            </div>

            <div class="card">

                <h3>Cidades</h3>

                <span id="totalCidades">

                    0

                </span>

            </div>

            <div class="card">

                <h3>Firebase</h3>

                <span>

                    Online

                </span>

            </div>

        </section>



        <!-- PESQUISA -->

        <section class="pesquisa">

            <input

                type="text"

                id="pesquisa"

                placeholder="Pesquisar técnico..."

            >

        </section>



        <!-- TABELA -->

        <section>

            <table>

                <thead>

                    <tr>

                        <th>Nome</th>

                        <th>Cidade</th>

                        <th>Telefone</th>

                        <th>Ações</th>

                    </tr>

                </thead>

                <tbody id="listaTecnicos">

                </tbody>

            </table>

        </section>

    </main>

</div>



<!-- MODAL -->

<div class="modal" id="modal">

    <div class="janela">

        <h2>

            Cadastro de Técnico

        </h2>



        <input

            id="nome"

            placeholder="Nome"

        >



        <input

            id="endereco"

            placeholder="Endereço"

        >



        <input

            id="cidade"

            placeholder="Cidade"

        >



        <input

            id="telefone"

            placeholder="Telefone"

        >



        <input

            id="latitude"

            placeholder="Latitude"

        >



        <input

            id="longitude"

            placeholder="Longitude"

        >



        <div class="acoes">

            <button id="buscarCoordenadas">

                Buscar Coordenadas

            </button>

            <button id="salvarTecnico">

                Salvar

            </button>

            <button id="cancelar">

                Cancelar

            </button>

        </div>

    </div>

</div>

<script type="module" src="JS/admin.js"></script>

</body>

</html>
